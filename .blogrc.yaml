# Blog Configuration
# 공개 설정 - Git에 커밋 가능

server:
  host: oci-fcoinfup-ec1.fcoinfup.com
  ip: 152.67.214.190
  user: ubuntu
  deploy_path: /var/www/blog

blog:
  url: https://blog.fcoinfup.com
  title: "Yarang's Tech Lair"
  author: yarang
  description: Tech blog for AI and Developer
  language: ko-kr

deploy:
  ssh_key_path: ~/.ssh/blog_deploy
  github_secrets:
    - OCI_HOST
    - OCI_USER
    - OCI_DEPLOY_PATH
    - SSH_PRIVATE_KEY

monitoring:
  enabled: true
  interval: 60
  alerts:
    http_failure: true
    ssh_failure: true
    disk_threshold: 90
