<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="agentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="busGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fa709a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fee140;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#f8fafc"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1e293b">Multi-Agent Platform Architecture</text>

  <!-- Message Bus (Center) -->
  <rect x="100" y="220" width="600" height="60" rx="10" fill="url(#busGrad)" filter="url(#shadow)"/>
  <text x="400" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">Message Bus / Communication Layer</text>

  <!-- Orchestrator (Top) -->
  <rect x="300" y="70" width="200" height="80" rx="10" fill="url(#headerGrad)" filter="url(#shadow)"/>
  <text x="400" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Orchestrator</text>
  <text x="400" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.8)">Task Coordination</text>
  <text x="400" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.8)">Agent Scheduling</text>

  <!-- Arrows from Orchestrator to Bus -->
  <line x1="400" y1="150" x2="400" y2="220" stroke="#667eea" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="400,218 395,208 405,208" fill="#667eea"/>

  <!-- Agent 1 -->
  <rect x="50" y="330" width="140" height="100" rx="10" fill="url(#agentGrad)" filter="url(#shadow)"/>
  <text x="120" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">Research Agent</text>
  <text x="120" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.9)">• Web Search</text>
  <text x="120" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.9)">• Data Collection</text>
  <text x="120" y="415" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.9)">• Analysis</text>

  <!-- Agent 2 -->
  <rect x="230" y="330" width="140" height="100" rx="10" fill="url(#agentGrad)" filter="url(#shadow)"/>
  <text x="300" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">Code Agent</text>
  <text x="300" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.9)">• Code Generation</text>
  <text x="300" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.9)">• Refactoring</text>
  <text x="300" y="415" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.9)">• Testing</text>

  <!-- Agent 3 -->
  <rect x="430" y="330" width="140" height="100" rx="10" fill="url(#agentGrad)" filter="url(#shadow)"/>
  <text x="500" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">Writer Agent</text>
  <text x="500" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.9)">• Content Creation</text>
  <text x="500" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.9)">• Summarization</text>
  <text x="500" y="415" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.9)">• Translation</text>

  <!-- Agent 4 -->
  <rect x="610" y="330" width="140" height="100" rx="10" fill="url(#agentGrad)" filter="url(#shadow)"/>
  <text x="680" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">Tool Agent</text>
  <text x="680" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.9)">• API Integration</text>
  <text x="680" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.9)">• File Operations</text>
  <text x="680" y="415" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.9)">• External Tools</text>

  <!-- Arrows from Agents to Bus -->
  <line x1="120" y1="330" x2="120" y2="280" stroke="#4facfe" stroke-width="2"/>
  <polygon points="120,282 115,292 125,292" fill="#4facfe"/>

  <line x1="300" y1="330" x2="300" y2="280" stroke="#4facfe" stroke-width="2"/>
  <polygon points="300,282 295,292 305,292" fill="#4facfe"/>

  <line x1="500" y1="330" x2="500" y2="280" stroke="#4facfe" stroke-width="2"/>
  <polygon points="500,282 495,292 505,292" fill="#4facfe"/>

  <line x1="680" y1="330" x2="680" y2="280" stroke="#4facfe" stroke-width="2"/>
  <polygon points="680,282 675,292 685,292" fill="#4facfe"/>

  <!-- State Store -->
  <rect x="50" y="130" width="120" height="60" rx="8" fill="#10b981" filter="url(#shadow)"/>
  <text x="110" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">State Store</text>
  <text x="110" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.9)">Shared Memory</text>

  <!-- Task Queue -->
  <rect x="630" y="130" width="120" height="60" rx="8" fill="#f59e0b" filter="url(#shadow)"/>
  <text x="690" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Task Queue</text>
  <text x="690" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.9)">Priority Queue</text>

  <!-- Connection lines -->
  <line x1="170" y1="160" x2="298" y2="160" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="502" y1="160" x2="630" y2="160" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Legend -->
  <rect x="280" y="460" width="240" height="30" rx="5" fill="#e2e8f0"/>
  <circle cx="310" cy="475" r="6" fill="url(#headerGrad)"/>
  <text x="325" y="479" font-family="Arial, sans-serif" font-size="10" fill="#475569">Orchestrator</text>
  <circle cx="400" cy="475" r="6" fill="url(#agentGrad)"/>
  <text x="415" y="479" font-family="Arial, sans-serif" font-size="10" fill="#475569">Agent</text>
  <circle cx="470" cy="475" r="6" fill="url(#busGrad)"/>
  <text x="485" y="479" font-family="Arial, sans-serif" font-size="10" fill="#475569">Message Bus</text>
</svg>