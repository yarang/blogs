<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
    <filter id="shadow2" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#f8fafc"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1e293b">Agent State Machine</text>

  <!-- Idle State -->
  <circle cx="100" cy="150" r="40" fill="#94a3b8" filter="url(#shadow2)"/>
  <text x="100" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">IDLE</text>
  <text x="100" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.8)">대기</text>

  <!-- Start point -->
  <circle cx="40" cy="150" r="8" fill="#1e293b"/>
  <line x1="48" y1="150" x2="58" y2="150" stroke="#1e293b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Receiving State -->
  <circle cx="250" cy="150" r="40" fill="#3b82f6" filter="url(#shadow2)"/>
  <text x="250" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">RECEIVING</text>
  <text x="250" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.8)">수신중</text>

  <!-- Processing State -->
  <circle cx="400" cy="150" r="40" fill="#8b5cf6" filter="url(#shadow2)"/>
  <text x="400" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">PROCESSING</text>
  <text x="400" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.8)">처리중</text>

  <!-- Executing State -->
  <circle cx="550" cy="150" r="40" fill="#f59e0b" filter="url(#shadow2)"/>
  <text x="550" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">EXECUTING</text>
  <text x="550" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.8)">실행중</text>

  <!-- Completed State -->
  <circle cx="700" cy="150" r="40" fill="#10b981" filter="url(#shadow2)"/>
  <text x="700" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">COMPLETED</text>
  <text x="700" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.8)">완료</text>

  <!-- Error State -->
  <circle cx="400" cy="320" r="40" fill="#ef4444" filter="url(#shadow2)"/>
  <text x="400" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">ERROR</text>
  <text x="400" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.8)">오류</text>

  <!-- Transitions -->
  <!-- IDLE -> RECEIVING -->
  <line x1="140" y1="150" x2="208" y2="150" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="175" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">task_received</text>

  <!-- RECEIVING -> PROCESSING -->
  <line x1="290" y1="150" x2="358" y2="150" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="325" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">validated</text>

  <!-- PROCESSING -> EXECUTING -->
  <line x1="440" y1="150" x2="508" y2="150" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="475" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">ready</text>

  <!-- EXECUTING -> COMPLETED -->
  <line x1="590" y1="150" x2="658" y2="150" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="625" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">success</text>

  <!-- COMPLETED -> IDLE -->
  <path d="M 700 110 Q 700 60 400 60 Q 100 60 100 108" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="400" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">acknowledged</text>

  <!-- Error transitions -->
  <line x1="250" y1="190" x2="370" y2="285" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
  <line x1="400" y1="190" x2="400" y2="278" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
  <line x1="550" y1="190" x2="430" y2="285" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
  <text x="300" y="250" font-family="Arial, sans-serif" font-size="8" fill="#dc2626">error</text>
  <text x="500" y="250" font-family="Arial, sans-serif" font-size="8" fill="#dc2626">error</text>

  <!-- Error -> IDLE (retry) -->
  <path d="M 360 320 Q 200 320 150 250 Q 100 190 100 192" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="8" fill="#64748b">retry</text>

  <!-- Legend -->
  <rect x="550" y="280" width="220" height="140" rx="8" fill="#e2e8f0"/>
  <text x="660" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#334155">Legend</text>

  <circle cx="580" cy="330" r="8" fill="#94a3b8"/>
  <text x="600" y="334" font-family="Arial, sans-serif" font-size="10" fill="#475569">Idle / Waiting</text>

  <circle cx="580" cy="355" r="8" fill="#3b82f6"/>
  <text x="600" y="359" font-family="Arial, sans-serif" font-size="10" fill="#475569">Active Processing</text>

  <circle cx="580" cy="380" r="8" fill="#10b981"/>
  <text x="600" y="384" font-family="Arial, sans-serif" font-size="10" fill="#475569">Success</text>

  <circle cx="580" cy="405" r="8" fill="#ef4444"/>
  <text x="600" y="409" font-family="Arial, sans-serif" font-size="10" fill="#475569">Error / Retry</text>
</svg>