<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550">
  <defs>
    <filter id="shadow3" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="550" fill="#f8fafc"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1e293b">Message Structure</text>

  <!-- Main Message Envelope -->
  <rect x="50" y="50" width="320" height="450" rx="10" fill="white" stroke="#e2e8f0" stroke-width="2" filter="url(#shadow3)"/>
  <rect x="50" y="50" width="320" height="40" rx="10" fill="#6366f1"/>
  <rect x="50" y="80" width="320" height="10" fill="#6366f1"/>
  <text x="210" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Message Envelope</text>

  <!-- Header Section -->
  <rect x="70" y="110" width="280" height="130" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="85" y="130" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#334155">Header</text>

  <text x="85" y="155" font-family="monospace" font-size="10" fill="#475569">message_id: uuid</text>
  <text x="85" y="172" font-family="monospace" font-size="10" fill="#475569">timestamp: ISO8601</text>
  <text x="85" y="189" font-family="monospace" font-size="10" fill="#475569">source_agent: string</text>
  <text x="85" y="206" font-family="monospace" font-size="10" fill="#475569">target_agent: string | broadcast</text>
  <text x="85" y="223" font-family="monospace" font-size="10" fill="#475569">message_type: enum</text>

  <!-- Metadata Section -->
  <rect x="70" y="255" width="280" height="90" rx="6" fill="#fef3c7" stroke="#fcd34d"/>
  <text x="85" y="275" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#92400e">Metadata</text>

  <text x="85" y="300" font-family="monospace" font-size="10" fill="#78350f">priority: high | normal | low</text>
  <text x="85" y="317" font-family="monospace" font-size="10" fill="#78350f">ttl: seconds</text>
  <text x="85" y="334" font-family="monospace" font-size="10" fill="#78350f">correlation_id: uuid</text>

  <!-- Payload Section -->
  <rect x="70" y="360" width="280" height="120" rx="6" fill="#dbeafe" stroke="#93c5fd"/>
  <text x="85" y="380" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1e40af">Payload</text>

  <text x="85" y="405" font-family="monospace" font-size="10" fill="#1e3a8a">content_type: json | protobuf</text>
  <text x="85" y="422" font-family="monospace" font-size="10" fill="#1e3a8a">encoding: utf-8 | base64</text>
  <text x="85" y="439" font-family="monospace" font-size="10" fill="#1e3a8a">data: { ... }</text>
  <text x="85" y="456" font-family="monospace" font-size="10" fill="#1e3a8a">attachments: File[]</text>

  <!-- Message Types -->
  <rect x="430" y="50" width="320" height="220" rx="10" fill="white" stroke="#e2e8f0" stroke-width="2" filter="url(#shadow3)"/>
  <rect x="430" y="50" width="320" height="40" rx="10" fill="#10b981"/>
  <rect x="430" y="80" width="320" height="10" fill="#10b981"/>
  <text x="590" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Message Types</text>

  <!-- Type boxes -->
  <rect x="450" y="110" width="130" height="35" rx="4" fill="#dbeafe"/>
  <text x="515" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1e40af">TASK_REQUEST</text>

  <rect x="600" y="110" width="130" height="35" rx="4" fill="#d1fae5"/>
  <text x="665" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#065f46">TASK_RESULT</text>

  <rect x="450" y="155" width="130" height="35" rx="4" fill="#fce7f3"/>
  <text x="515" y="177" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#9d174d">STATUS_UPDATE</text>

  <rect x="600" y="155" width="130" height="35" rx="4" fill="#fef3c7"/>
  <text x="665" y="177" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#92400e">HEARTBEAT</text>

  <rect x="450" y="200" width="130" height="35" rx="4" fill="#e0e7ff"/>
  <text x="515" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#3730a3">QUERY</text>

  <rect x="600" y="200" width="130" height="35" rx="4" fill="#dcfce7"/>
  <text x="665" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#166534">RESPONSE</text>

  <!-- Communication Patterns -->
  <rect x="430" y="290" width="320" height="210" rx="10" fill="white" stroke="#e2e8f0" stroke-width="2" filter="url(#shadow3)"/>
  <rect x="430" y="290" width="320" height="40" rx="10" fill="#8b5cf6"/>
  <rect x="430" y="320" width="320" height="10" fill="#8b5cf6"/>
  <text x="590" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Communication Patterns</text>

  <!-- Pattern: Request-Response -->
  <rect x="450" y="350" width="280" height="35" rx="4" fill="#f3e8ff"/>
  <text x="465" y="372" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#6b21a8">Request-Response</text>
  <text x="600" y="372" font-family="Arial, sans-serif" font-size="10" fill="#7c3aed">동기식 1:1 통신</text>

  <!-- Pattern: Pub-Sub -->
  <rect x="450" y="395" width="280" height="35" rx="4" fill="#fce7f3"/>
  <text x="465" y="417" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#9d174d">Publish-Subscribe</text>
  <text x="610" y="417" font-family="Arial, sans-serif" font-size="10" fill="#db2777">비동기식 1:N 통신</text>

  <!-- Pattern: Broadcast -->
  <rect x="450" y="440" width="280" height="35" rx="4" fill="#ecfdf5"/>
  <text x="465" y="462" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#047857">Broadcast</text>
  <text x="600" y="462" font-family="Arial, sans-serif" font-size="10" fill="#059669">전체 에이전트 알림</text>
</svg>