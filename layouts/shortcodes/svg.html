{{ $src := .Get "src" }}
{{ $alt := .Get "alt" | default "" }}
{{ $width := .Get "width" | default "100%" }}
{{ $height := .Get "height" | default "auto" }}

<figure class="svg-figure">
  <img
    src="{{ $src | relURL }}"
    alt="{{ $alt }}"
    width="{{ $width }}"
    height="{{ $height }}"
    loading="lazy"
    style="max-width: 100%; height: auto; display: block; margin: 1.5rem auto;"
  />
  {{ with $alt }}
  <figcaption style="text-align: center; font-size: 0.9em; color: #666; margin-top: 0.5rem;">
    {{ . }}
  </figcaption>
  {{ end }}
</figure>
