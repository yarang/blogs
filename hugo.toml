baseURL = 'https://blog.fcoinfup.com/'
languageCode = 'ko-kr'
title = "Yarang's Tech Lair"
theme = 'PaperMod'

[pagination]
  pagerSize = 10

[params]
  env = "production"
  description = "Tech blog for AI and Developer"
  author = "yarang"
  defaultTheme = "light"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableThemeToggle = true

  [params.profileMode]
    enabled = true
    title = "Yarang's Tech Lair"
    subtitle = "AI와 개발에 대한 기술 블로그"
    # imageUrl = "/images/profile.png"
    # imageWidth = 120
    # imageHeight = 120

    [[params.profileMode.buttons]]
      name = "포스트"
      url = "/posts/"

    [[params.profileMode.buttons]]
      name = "카테고리"
      url = "/categories/"

    [[params.profileMode.buttons]]
      name = "태그"
      url = "/tags/"

    [[params.profileMode.buttons]]
      name = "검색"
      url = "/search/"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/yarang"

[params.editPost]
  URL = "https://github.com/yarang/blogs/tree/main/content"
  Text = "Suggest Changes"
  appendFilePath = true

# 포스트 목록 카드 뷰 설정
[params.home]
  [params.home.columns]
    pc = 2
    mobile = 1

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "포스트"
    url = "/posts/"
    weight = 10

  [[menu.main]]
    identifier = "categories"
    name = "카테고리"
    url = "/categories/"
    weight = 20

  [[menu.main]]
    identifier = "tags"
    name = "태그"
    url = "/tags/"
    weight = 30

  [[menu.main]]
    identifier = "archives"
    name = "아카이브"
    url = "/archives/"
    weight = 40

  [[menu.main]]
    identifier = "search"
    name = "검색"
    url = "/search/"
    weight = 50

[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = false
    style = "github"
