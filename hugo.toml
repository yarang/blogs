baseURL = 'https://blog.fcoinfup.com/'
languageCode = 'en'
defaultContentLanguage = 'en'
defaultContentLanguageInSubdir = false
hasCJKLanguage = true
title = "Yarang's Tech Lair"
theme = 'stack'

[pagination]
    pagerSize = 10

[permalinks]
    post = "/post/:slug/"
    page = "/:slug/"

[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = false
    style = "monokai"

# English Language
[languages.en]
  languageName = "English"
  title = "Yarang's Tech Lair"
  weight = 1
  contentDir = "content/en"

  [languages.en.params]
    description = "Tech blog about AI and Development"
    sidebar = { subtitle = "Tech blog about AI and Development" }

# Korean Language
[languages.ko]
  languageName = "한국어"
  title = "Yarang's Tech Lair"
  weight = 2
  contentDir = "content/ko"

  [languages.ko.params]
    description = "AI와 개발에 대한 기술 블로그"
    sidebar = { subtitle = "AI와 개발에 대한 기술 블로그" }

  [languages.en.params]
    description = "Tech blog about AI and Development"
    sidebar = { subtitle = "Tech blog about AI and Development" }

# Korean Menu
[[languages.ko.menu.main]]
  identifier = "posts"
  name = "포스트"
  url = "/ko/post/"
  weight = 10

[[languages.ko.menu.main]]
  identifier = "categories"
  name = "카테고리"
  url = "/ko/categories/"
  weight = 20

[[languages.ko.menu.main]]
  identifier = "tags"
  name = "태그"
  url = "/ko/tags/"
  weight = 30

[[languages.ko.menu.main]]
  identifier = "archives"
  name = "아카이브"
  url = "/ko/archives/"
  weight = 40

[[languages.ko.menu.main]]
  identifier = "search"
  name = "검색"
  url = "/ko/search/"
  weight = 50

# English Menu
[[languages.en.menu.main]]
  identifier = "posts"
  name = "Posts"
  url = "/post/"
  weight = 10

[[languages.en.menu.main]]
  identifier = "categories"
  name = "Categories"
  url = "/categories/"
  weight = 20

[[languages.en.menu.main]]
  identifier = "tags"
  name = "Tags"
  url = "/tags/"
  weight = 30

[[languages.en.menu.main]]
  identifier = "archives"
  name = "Archives"
  url = "/archives/"
  weight = 40

[[languages.en.menu.main]]
  identifier = "search"
  name = "Search"
  url = "/search/"
  weight = 50

# Social Icons
[[social]]
    identifier = "github"
    name = "GitHub"
    url = "https://github.com/yarang"

    [social.params]
        icon = "brand-github"

# Parameters
mainSections = ["post"]
rssFullContent = true

[sidebar]
    emoji    = ""
    subtitle = "Tech blog about AI and Development"

[article]
    license = { enabled = false }

[widgets]
    homepage = [
        { type = "search" },
        { type = "archives", params = { limit = 5 } },
        { type = "categories", params = { limit = 10 } },
        { type = "tag-cloud", params = { limit = 10 } },
    ]
    page     = [{ type = "toc" }]

[comments]
    enabled  = false

[cookies]
    enabled = false

[outputs]
  home = ["HTML", "RSS", "JSON"]
